name: Flutter CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
    tags: ['v*']

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: roam_io

jobs:
  analyze:
    name: Format & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Run static analysis
        run: flutter analyze

  test:
    name: Test & Coverage
    needs: analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Enforce coverage threshold
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: roam_io/coverage/lcov.info
          min_coverage: 10

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: roam_io/coverage/lcov.info

  debug-apk:
    name: Build Debug APK
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: roam_io/build/app/outputs/flutter-apk/app-debug.apk

  release-apk:
    name: Build Release APK
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android release APK
        run: flutter build apk --release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: roam_io/build/app/outputs/flutter-apk/app-release.apk